name: Uppdatera live-resultat

on:
  schedule:
    - cron: "*/2 * * * *"   # var 2:e minut (GitHub tillåter minst var 5:e minut i praktiken)
  workflow_dispatch: {}       # tillåt manuell körning via Actions-fliken

permissions:
  contents: write             # behövs för att committa data/live.json

concurrency:
  group: live-scores
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Hämta live-resultat
        env:
          FOOTBALL_API_TOKEN: ${{ secrets.FOOTBALL_API_TOKEN }}
          COMPETITION: WC
        run: node scripts/fetch-scores.mjs

      - name: Committa om data ändrats
        run: |
          if [[ -n "$(git status --porcelain data/live.json data/goals.json data/bracket.json)" ]]; then
            git config user.name "vm-tip-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/live.json data/goals.json data/bracket.json
            git commit -m "Uppdatera live-resultat"
            git push
          else
            echo "Inga ändringar att committa."
          fi
